name: Feature Request
description: Propose a user-facing enhancement for kanDB or the workspace tooling.
title: "[feature] <scope>: "
body:
  - type: dropdown
    id: scope
    attributes:
      label: Target scope
      description: Select the area that should gain this feature.
      options:
        - kandb
        - xtask
        - workspace
        - packaging
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Explain the user problem or workflow gap first.
      placeholder: Users cannot...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior and UX.
      placeholder: Add a screen / action / option that...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List rejected approaches, workarounds, or tradeoffs.

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain who benefits and what changes in practice.
      placeholder: This would help users who...
    validations:
      required: true
