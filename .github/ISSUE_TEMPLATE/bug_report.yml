name: Bug Report
description: Report a reproducible defect in kanDB or the workspace tooling.
title: "[bug] <scope>: "
body:
  - type: dropdown
    id: scope
    attributes:
      label: Affected scope
      description: Select the area where the bug occurs.
      options:
        - kandb
        - xtask
        - workspace
        - ci
        - packaging
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem in one concise paragraph.
      placeholder: The app crashes when...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide stable reproduction steps.
      placeholder: |
        1. Launch ...
        2. Open ...
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: It should...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: It instead...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, stack traces, or screenshots if available.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, app version or commit, and any other context.
      placeholder: macOS 15.4, main@abcdef, debug build
    validations:
      required: true
